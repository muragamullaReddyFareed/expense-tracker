<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ledger — Income</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<header class="navbar">
    <div class="navbar__brand"><span class="mark">§</span> Ledger</div>
    <nav class="navbar__links">
        <a href="/dashboard.html"  class="nav-link">Dashboard</a>
        <a href="/income.html"     class="nav-link active">Income</a>
        <a href="/expenses.html"   class="nav-link">Expenses</a>
        <a href="/budget.html" class="nav-link">Budget</a>
        <a href="/reports.html"    class="nav-link">Reports</a>
        <a href="/categories.html" class="nav-link">Categories</a>
    </nav>
    <div class="navbar__user">
        <span class="navbar__name" id="userName"></span>
        <button class="btn-signout" onclick="logout()">Sign out</button>
    </div>
</header>
<main class="page">
    <div class="page-header">
        <h1>Income</h1>
        <p>Log and manage all your income sources.</p>
    </div>
    <div class="form-card">
        <h2>Add Income Entry</h2>
        <div class="error-banner" id="formError" style="display:none"></div>
        <div class="form-row">
            <div class="field">
                <label for="category">Category</label>
                <select id="category"><option>Salary</option></select>
            </div>
            <div class="field">
                <label for="amount">Amount (₹)</label>
                <input id="amount" type="number" min="0.01" step="0.01" placeholder="0.00"/>
            </div>
            <div class="field">
                <label for="txDate">Date</label>
                <input id="txDate" type="date"/>
            </div>
        </div>
        <div class="field">
            <label for="description">Note (optional)</label>
            <input id="description" type="text" placeholder="e.g. June salary, client payment…"/>
        </div>
        <button id="addBtn" class="btn btn-income" onclick="addIncome()">+ Add Income</button>
    </div>
    <div class="filter-bar">
        <div class="field">
            <label>Search</label>
            <input id="search" type="text" placeholder="Search by note or category…"
                   onkeydown="if(event.key==='Enter') applyFilters()"/>
        </div>
        <div class="field">
            <label>Category</label>
            <select id="filterCategory"><option value="">All Categories</option></select>
        </div>
        <div class="field">
            <label>From Date</label>
            <input id="startDate" type="date"/>
        </div>
        <div class="field">
            <label>To Date</label>
            <input id="endDate" type="date"/>
        </div>
        <div class="filter-actions">
            <button class="btn btn-income btn-sm" onclick="applyFilters()">Apply</button>
            <button class="btn btn-ghost  btn-sm" onclick="clearFilters()">Clear</button>
        </div>
    </div>
    <div class="ledger-wrap">
        <div class="ledger-header">
            <h2>Income Entries</h2>
            <span class="ledger-count" id="resultCount">0 entries</span>
        </div>
        <p id="loadingMsg" style="padding:20px;color:var(--muted);display:none">Loading…</p>
        <div class="ledger" id="incomeList"></div>
    </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/income.js"></script>
</body>
</html>
