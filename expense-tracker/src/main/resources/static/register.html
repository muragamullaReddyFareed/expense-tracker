<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ledger — Create Account</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-screen">
    <div class="auth-card">
        <div class="auth-card__brand"><span class="mark">§</span><h1> Ledger </h1></div>
        <h1>Create your account</h1>
        <p>Start tracking your income and expenses today.</p>
        <div class="error-banner" id="error" style="display:none"></div>
        <form onsubmit="handleRegister(event)">
            <div class="field">
                <label for="name">Full Name</label>
                <input id="name" type="text" required placeholder="Your name" autocomplete="name"/>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" required placeholder="you@example.com" autocomplete="email"/>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" required placeholder="Min 6 characters" autocomplete="new-password"/>
            </div>
            <button type="submit" class="btn btn-primary">Create account</button>
        </form>
        <div class="auth-card__footer">
            Already have an account? <a href="/index.html">Sign in</a>
        </div>
    </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
