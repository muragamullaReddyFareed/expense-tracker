<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ledger — Dashboard</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="navbar">
    <div class="navbar__brand"><span>§</span> Ledger</div>
    <nav class="navbar__links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="income.html">Income</a>
        <a href="expenses.html">Expenses</a>
    </nav>
    <div class="navbar__user">
        <span id="userName"></span>
        <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
</header>

<main class="page">
    <div class="page-header">
        <h1>Dashboard</h1>
        <p>A running total of everything you have logged.</p>
    </div>
    <div class="summary-grid">
        <div class="summary-card income">
            <span class="summary-card__label">Total Income</span>
            <span class="summary-card__amount" id="totalIncome">Loading...</span>
        </div>
        <div class="summary-card expense">
            <span class="summary-card__label">Total Expense</span>
            <span class="summary-card__amount" id="totalExpense">Loading...</span>
        </div>
        <div class="summary-card savings">
            <span class="summary-card__label">Savings</span>
            <span class="summary-card__amount" id="savings">Loading...</span>
        </div>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
