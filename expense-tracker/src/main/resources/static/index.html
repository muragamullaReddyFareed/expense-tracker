<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ledger — Sign In</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-screen">
    <div class="auth-card">
        <div class="auth-card__brand"><span class="mark">§</span><h1> Ledger </h1></div>
        <h1>Welcome back</h1>
        <p>Sign in to manage your finances.</p>
        <div class="error-banner" id="error" style="display:none"></div>
        <form onsubmit="handleLogin(event)">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" required placeholder="you@example.com" autocomplete="email"/>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" required placeholder="••••••" autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn btn-primary">Sign in</button>
        </form>
        <div class="auth-card__footer">
            New here? <a href="/register.html">Create an account</a>
        </div>
    </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
