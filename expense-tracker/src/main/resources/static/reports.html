<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ledger — Monthly Reports</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<header class="navbar">
    <div class="navbar__brand"><span class="mark">§</span> Ledger</div>
    <nav class="navbar__links">
        <a href="/dashboard.html"  class="nav-link">Dashboard</a>
        <a href="/income.html"     class="nav-link">Income</a>
        <a href="/expenses.html"   class="nav-link">Expenses</a>
        <a href="/budget.html" class="nav-link">Budget</a>
        <a href="/reports.html"    class="nav-link active">Reports</a>
        <a href="/categories.html" class="nav-link">Categories</a>
    </nav>
    <div class="navbar__user">
        <span class="navbar__name" id="userName"></span>
        <button class="btn-signout" onclick="logout()">Sign out</button>
    </div>
</header>
<main class="page">
    <div class="page-header">
        <h1>Monthly Reports</h1>
        <p>Income vs expense breakdown month by month.</p>
    </div>
    <div class="report-controls">
        <label style="font-size:14px;font-weight:600;color:var(--ink-soft)">Year</label>
        <select class="report-year-select" id="yearSelect">
            <option value="2026">2026</option>
        </select>
    </div>
    <div class="error-banner" id="reportError" style="display:none">
        Could not load report. Make sure backend is running.
    </div>
    <p id="loadingMsg" style="color:var(--muted);margin-bottom:20px;display:none">
        Loading report…
    </p>
    <div id="reportContent" style="display:none">
        <div class="report-summary">
            <div class="report-card">
                <div class="report-card__label">Annual Income</div>
                <div class="report-card__value income" id="rptIncome">—</div>
            </div>
            <div class="report-card">
                <div class="report-card__label">Annual Expense</div>
                <div class="report-card__value expense" id="rptExpense">—</div>
            </div>
            <div class="report-card">
                <div class="report-card__label">Annual Savings</div>
                <div class="report-card__value savings" id="rptSavings">—</div>
            </div>
        </div>
        <div class="month-table">
            <table>
                <thead>
                <tr>
                    <th>Month</th>
                    <th>Income</th>
                    <th>Expense</th>
                    <th>Savings</th>
                    <th>Visual</th>
                </tr>
                </thead>
                <tbody id="monthBody"></tbody>
            </table>
        </div>
    </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/reports.js"></script>
</body>
</html>
