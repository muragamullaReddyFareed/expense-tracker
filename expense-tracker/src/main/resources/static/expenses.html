<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ledger — Expenses</title>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="navbar">
    <div class="navbar__brand"><span>§</span> Ledger</div>
    <nav class="navbar__links">
        <a href="dashboard.html">Dashboard</a>
        <a href="income.html">Income</a>
        <a href="expenses.html" class="active">Expenses</a>
    </nav>
    <div class="navbar__user">
        <span id="userName"></span>
        <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
</header>

<main class="page">
    <div class="page-header">
        <h1>Expenses</h1>
        <p>Log money going out — bills, groceries, anything you spend on.</p>
    </div>

    <div class="transaction-form">
        <div class="error-banner" id="formError" style="display:none;"></div>
        <div class="form-row">
            <div class="field">
                <label for="category">Category</label>
                <select id="category">
                    <option>Groceries</option>
                    <option>Rent</option>
                    <option>Utilities</option>
                    <option>Transport</option>
                    <option>Entertainment</option>
                    <option>Healthcare</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="field">
                <label for="amount">Amount (₹)</label>
                <input id="amount" type="number" min="0.01" step="0.01" placeholder="0.00"/>
            </div>
            <div class="field">
                <label for="date">Date</label>
                <input id="date" type="date"/>
            </div>
        </div>
        <div class="field">
            <label for="description">Note (optional)</label>
            <input id="description" type="text" placeholder="e.g. Weekly groceries"/>
        </div>
        <button class="btn-expense" onclick="addExpense()">Add expense</button>
    </div>

    <div id="expenseList"></div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/expenses.js"></script>
</body>
</html>
